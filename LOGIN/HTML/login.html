<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Login</title>
  <link rel="stylesheet" href="../css/login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container-fluid min-vh-100">
    <div class="row h-100 g-0">
      <div class="lado-esquerdo col-12 col-lg-6 d-none d-lg-block"></div>

      <div class="lado-direito col-12 col-lg-6 d-flex align-items-center justify-content-center vh-100 vh-md-auto">
        <form class="formulario-login w-100 px-4" style="max-width:400px" action="login.php" method="post">
          <h2>Login</h2>
          <p class="d-flex justify-content-center">Entre na sua conta da Galáxia do Saber</p>
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="Digite seu email" required />

          <label for="senha">Senha</label>
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required />

          <button type="submit">Entrar</button>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
