<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Cadastro</title>
  <link rel="stylesheet" href="../css/cadastro.css?v1" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <div class="container">
    <form class="formulario-login " action="login.php" method="post">
      <div class="titles">
        <h2>Seja bem-vindo(a)!</h2>
        <p>Crie a sua conta na Galáxia do Saber.</p>
      </div>
      <div class="campos">
        <div>
          <label for="nome">Nome Completo:</label>
          <input type="text" id="nome" name="nome" placeholder="Digite seu nome" required />
        </div>
        <div>
          <label for="perfil">Selecione o perfil:</label>
          <div class="radios">
            <div>
              <input type="radio" id="professor" name="profile" value="professor">
              <label for="professor">Professor</label><br>
            </div>
            <div>
              <input type="radio" id="responsavel" name="profile" value="responsavel">
              <label for="responsavel">Responsável</label><br>
            </div>
            <div>
              <input type="radio" id="aluno" name="profile" value="aluno">
              <label for="aluno">Aluno</label>
            </div>
          </div>
        </div>
        <div>
          <label for="senha">Email:</label>
          <input type="email" id="email" name="email" placeholder="Digite seu email" required />
        </div>
        <div>
          <label for="senha">Senha:</label>
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required />
        </div>
        <div>
          <label for="repetirSenha">Repita a senha:</label>
          <input type="password" id="repetirSenha" name="repetirSenha" placeholder="Digite a senha novamente"
            required />
        </div>
      </div>
      <div class="buttons">
        <button type="submit">Cadastrar</button>
        <a href="../../login/html/login.html" style="color:blue" class="d-flex justify-content-center">Já tenho uma
          conta. Entrar!</a>
      </div>
    </form>
  </div>
</body>

</html>
