<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Cadastro</title>
  <link rel="stylesheet" href="../css/cadastro.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
  <div class="container-fluid min-vh-100 d-flex align-items-center">
    <div class="row w-100 m-0">

      <div class="lado-direto d-flex justify-content-center align-items-center min-vh-100">
        <form class="formulario-login w-100 px-4" action="login.php" method="post">
          <h2>Seja bem-vindo(a)!</h2>
          <p class="d-flex justify-content-center">Crie a sua conta na Galáxia do Saber</p>
          <label for="nome">Nome Completo:</label>
          <input type="nome" id="nome" name="nome" placeholder="Digite seu nome" required />

          <label for="perfil">Selecione o perfil:</label>
          <div>
          <input type="radio" id="professor" name="profile" value="professor">
          <label for="professor">Professor</label><br>
          <input type="radio" id="responsavel" name="profile" value="responsavel">
          <label for="responsavel">Responsável</label><br>
          <input type="radio" id="aluno" name="profile" value="aluno">
          <label for="aluno">Aluno</label>
          </div>

          <label for="senha">Email:</label>
          <input type="email" id="email" name="email" placeholder="Digite seu email" required />

          <label for="senha">Senha:</label>
          <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required />

          <label for="repetirSenha">Repita a senha:</label>
          <input type="password" id="repetirSenha" name="repetirSenha" placeholder="Digite a senha novamente" required />

          <button type="submit">Cadastrar</button>
          <a href="../../login/html/login.html" style="color:blue" class="d-flex justify-content-center">Já tenho uma conta. Entrar!</a>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
