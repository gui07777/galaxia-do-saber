<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
<link rel="stylesheet" href="teacher-register.css">
<div id="teacher-register">
    <form class="form" method="POST" form action="../../../../Controller/CadastroProfessor.php">
        <div class="container">
            <h2>Cadastro de Professores</h2>
            <div class="fields">
                <div class="left-side">
                    <div>
                        <label for="">Nome:</label>
                        <input type="text" name="nome" required>
                    </div>
                    <div>
                        <label for="">CPF:</label>
                        <input type="text" name="cpf" required></input>
                    </div>
                    <div>
                        <label for="">Cargo:</label>
                        <input type="text" name="cargo" required>
                    </div>
                    <div>
                        <label for="">Disciplina:</label>
                        <input type="text" name="disciplina" required></input>
                    </div>
                </div>
                <div class="right-side">
                    <div>
                        <label for="">Email:</label>
                        <input type="text" name="email" required>
                    </div>
                    <div>
                        <label for="instituicao_nome">Nome da sua Instituição:</label>
                        <input type="text" name="razao_social" required>
                    </div>
                    <div>
                        <label for="">Senha:</label>
                        <input type="password" name="senha" required></input>
                    </div>
                    <div>
                        <label for="">Repetir senha:</label>
                        <input type="password" name="repetir_senha" required></input>
                    </div>
                </div>
            </div>
            <div class="buttons">
                <!-- <span class="material-symbols-outlined">arrow_back</span> -->
                <img src="../../../../assets/icons/volte.png" alt="" onclick="navigationBack()">
                <input type="submit" name="requisicao" value="Cadastrar">
            </div>
        </div>
    </form>
</div>
