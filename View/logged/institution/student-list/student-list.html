<link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@48,400,1,0" />
<link rel="stylesheet" href="student-list.css">
<div id="student-area">
    <div class="container">
        <h1>Alunos matriculados</h1>
        <table>
            <thead>
                <th>Nome</th>
                <th>Mais informações</th>
            </thead>
            <tbody>
                <tr>
                    <td>Aluno</td>
                    <td><button class="btn-visualizar">Ver detalhes</button></td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<div id="overlay-hide">
    <div id="information-modal-hide">
        <header>
            <div></div>
            <h3>Informações Gerais</h3>
            <i class="material-symbols-outlined" onclick="closeModal()">close</i>
        </header>
        <div class="content">
            <div>
                <label for="">Nome:</label>
                <input type="text" readonly>
            </div>
            <div>
                <label for="">Número da matrícula:</label>
                <input type="text" readonly>
            </div>
            <div>
                <label for="">Email:</label>
                <input type="text" readonly>
            </div>
            <div>
                <label for="">Data de nascimento:</label>
                <input type="text" readonly>
            </div>
            <div>
                <label for="">Turma:</label>
                <input type="text" readonly>
            </div>
            <div class="buttons">
                <button onclick="editInformation()">Editar</button>
            </div>
        </div>
    </div>
</div>
<script src="student-list.js"></script>
