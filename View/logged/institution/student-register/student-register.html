<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de alunos!</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="student-register.css?v=0">
</head>


<body>
    <form class="container" method="POST" form action="">
        <div>
            <h2>Cadastro de Alunos</h2>
            <div class="fields">
                <div class="left-side">
                    <div>
                        <label for="">Nome:</label>
                        <input type="text" name="nome" required>
                    </div>
                    <div>
                        <label for="">Número da matrícula:</label>
                        <input type="text" name="cpf" required></input>
                    </div>
                    <div>
                        <label for="">Data de Nascimento:</label>
                        <input type="text" name="cargo" required>
                    </div>
                </div>
                <div class="right-side">
                    <div>
                        <label for="">Email:</label>
                        <input type="text" name="email" required>
                    </div>
                    <div>
                        <label for="">Senha:</label>
                        <input type="password" name="senha" required></input>
                    </div>
                    <div>
                        <label for="">Repetir senha:</label>
                        <input type="password" name="repetir_senha" required></input>
                    </div>
                </div>
            </div>
            <div class="buttons">
                <!-- <span class="material-symbols-outlined">arrow_back</span> -->
                <img src="../../../../assets/icons/volte.png" alt="" onclick="navigationBack()">
                <input type="submit" value="Cadastrar">
            </div>
        </div>
    </form>
    <script src="student-register.js"></script>
</body>

</html>
