<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crie sua Atividade!</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="activities-creation.css">
</head>

<body>
    <form class="form" method="POST" enctype="multipart/form-data" action="../../../../Controller/TurmaController.php">
        <div class="container">
            <h1>Adicionar atividade</h1>
            <div class="fields">
                <div>
                    <label for="titulo">Título da Atividade:</label>
                    <input type="text" name="nome" id="titulo" required>
                </div>
                <div>
                    <label for="prazo">Prazo (data limite):</label>
                    <input type="date" name="prazo" id="prazo" required>
                </div>

                <div>
                    <label for="data_post">Data de Publicação:</label>
                    <input type="datetime-local" name="data_post" id="data_post" required>
                </div>

                <div>
                    <label for="anexo">Anexo (opcional):</label>
                    <input type="file" name="anexo" id="anexo" accept=".pdf, .doc, .docx, .jpg, .png, .zip, .rar">
                </div>

            </div>
            <div class="buttons">
                <!-- <span class="material-symbols-outlined">arrow_back</span> -->
                <img src="../../../../assets/icons/volte.png" alt="" onclick="navigationBack()">
                <input type="submit" value="Criar" name="requisicao">
            </div>
        </div>
    </form>
    <script src="class-creation.js"></script>
</body>

</html>
