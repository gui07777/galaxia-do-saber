<link rel="stylesheet" href="style.css">
<div id="digital-material">
  <div class="container">
    <div class="card">
      <h1>Adicionar atividades</h1>

      <label for="assunto">Assunto da Atividade</label>
      <input type="text" id="assunto" placeholder="">

      <label for="descricao">Descrição</label>
      <div class="descricao-wrapper">
        <textarea id="descricao" rows="4" placeholder=""></textarea>
        <span class="icone-clipe">📎</span>
      </div>

      <div class="botoes">
        <button class="voltar">←</button>
        <button class="adicionar" onclick="adicionarAtividade()">Adicionar</button>
      </div>
    </div>
  </div>
</div>
<script src="digital-material.js"></script>
