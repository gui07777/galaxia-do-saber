<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações de perfil!</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="student-profile.css">
</head>

<body>
    <header>
        <img src="../../../../assets/icons/logosemfundo.png" class="logo">
        <div class="width"></div>
        <div class="buttons">
            <img src="../../../../assets/icons/sininho.png" alt="">
            <img src="../../../../assets/icons/anonimous.png" alt="">
        </div>
    </header>
    <form action="../../../../Controller/AlunoController.php" method="POST">
        <div class="container">
            <h2>Informações do perfil</h2>
            <div class="fields">
                <div class="left-side">
                    <div>
                        <label for="">Nome:</label>
                        <input type="text" name="nome" required>
                    </div>
                    <div>
                        <label for="">Data de nascimento:</label>
                        <input type="date" name="data_nasc">
                        <div>
                            <label for="">Turma:</label>
                            <input type="text" name="turma"></input>
                        </div>
                    </div>
                </div>
                <div class="right-side">
                    <div>
                        <label for="">Email:</label>
                        <input type="text" name="email" required>
                    </div>
                    <div>
                        <label for="">Senha:</label>
                        <input type="text" name="novaSenha" placeholder="Deixe em branco se não for alterar"></input>
                    </div>
                </div>
            </div>
            <div class="buttons">
                <!-- <span class="material-symbols-outlined">arrow_back</span> -->
                <img src="../../../../assets/icons/volte.png" alt="" onclick="navigationBack()">
                <input type="submit" value="Editar" name="requisicao">
            </div>
    </form>
    </div>
    <script src="student-profile.js"></script>
</body>

</html>
