<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informações de perfil!</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" />
    <link rel="stylesheet" href="student-profile.css">
</head>

<body>
    <header>
        <div>
            <img src="../../../../assets/icons/logosemfundo.png" class="logo">
        </div>
        <div class="header-buttons">
            <a href="#/teacher-notifications" data-page="../teacher-notifications/teacher-notifications.html">
                <i class="material-symbols-outlined">notifications</i>
            </a>
            <a href="#/teacher-profile" data-page="../teacher-profile/teacher-profile.html">
                <i class="material-symbols-outlined">account_circle</i>
            </a>
        </div>
    </header>
    <form action="../../../../Controller/AlunoController.php" method="POST" class="container">
        <h2>Informações do perfil</h2>
        <div class="fields">
            <div class="left-side">
                <div>
                    <label for="">Nome:</label>
                    <input type="text" readonly>
                </div>
                <div>
                    <label for="">Data de nascimento:</label>
                    <input type="date" readonly>
                </div>
                <div>
                    <label for="">Turma:</label>
                    <input type="text" readonly></input>
                </div>
            </div>
            <div class="right-side">
                <div>
                    <label for="">Email:</label>
                    <input type="text" readonly>
                </div>
                <div>
                    <label for="">Senha:</label>
                    <input type="password"></input>
                </div>
            </div>
        </div>
        <div class="buttons">
            <img src="../../../../assets/icons/volte.png" alt="" onclick="navigationBack()">
            <input type="submit" value="Salvar alterações">
        </div>
    </form>
    <script src="student-profile.js"></script>
</body>

</html>
