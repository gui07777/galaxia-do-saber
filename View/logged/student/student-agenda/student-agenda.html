<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda</title>
    <link rel="stylesheet" href="student-agenda.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

    <header>
        <img src="../../../../assets/icons/logosemfundo.png" class="logo">
        <div class="width"></div>
        <div class="buttons">
            <a href="">
                <img src="../../../../assets/icons/sininho.png" alt="">
            </a>
            <a href="../student-profile/student-profile.php">
                <img src="../../../../assets/icons/anonimous.png" alt="">
            </a>
        </div>
    </header>
<div id="institutional-agenda">
  <div class="agenda-container">
    <h1>Bem Vindo(a) a Agenda!!!</h1>
    <img src="../../../../assets/icons/volte.png" class="btn-voltar" onclick="voltar()">
    
    
    <div class="calendar-header">
      <div class="year-box">
        <input type="number" id="year" value="2025" min="1500" max="5000" />
      </div>
      <div class="month-box">
        <select id="month">
          <option value="0">janeiro</option>
          <option value="1">fevereiro</option>
          <option value="2">março</option>
          <option value="3">abril</option>
          <option value="4">maio</option>
          <option value="5">junho</option>
          <option value="6">julho</option>
          <option value="7" selected>agosto</option>
          <option value="8">setembro</option>
          <option value="9">outubro</option>
          <option value="10">novembro</option>
          <option value="11">dezembro</option>
        </select>
      </div>
    </div>

    <table class="calendar-table">
      <thead>
        <tr>
          <th>DOMINGO</th>
          <th>SEGUNDA-FEIRA</th>
          <th>TERÇA-FEIRA</th>
          <th>QUARTA-FEIRA</th>
          <th>QUINTA-FEIRA</th>
          <th>SEXTA-FEIRA</th>
          <th>SÁBADO</th>
        </tr>
      </thead>
      <tbody id="calendar-body"></tbody>
    </table>

    
    <div class="notes-section" id="notes-section" style="display:none;">
      <label class="notes-label">Anotações:</label>
      <textarea id="notes" placeholder="Escreva suas anotações aqui..."></textarea>
      <button id="save-notes">Salvar</button>
    </div>

  </div>
</div>

<script src="student-agenda.js" defer></script>
</html>
