<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atividade</title>
    <link rel="stylesheet" href="activities-description.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <img src="../../../../../assets/icons/logosemfundo.png" class="logo">
        <div class="width"></div>
        <div class="buttons">
            <img src="../../../../../assets/icons/sininho.png" alt="">
            <img src="../../../../../assets/icons/anonimous.png" alt="">
        </div>
    </header>
    <main>
        <div class="back">
            <img src="../../../../../assets/icons/white-back.png" alt="" onclick="navigateBack()">
        </div>
        <div class="titles">
            <h1>Atividade</h1>
        </div>
        <div class="activities">
            <div class="background-activity">
                <div class="activity">
                    <h2>Atividade</h2>

                    <label for="descricao" class="label-black">Descrição:</label>

                    <div class="file-display">
                        <span></span>
                        <a href="#" download>
                            <img src="../../../../../assets/icons/download.png" alt="Baixar" width="25px">
                        </a>
                     </div>
                
                    <label for="upload">Suba aqui sua Atividade:</label>
                    <div class="upload-box">
                        <textarea id="upload" placeholder="Comentário (100)"></textarea>
                        <img src="../../../../../assets/icons/clipe.png" alt="Anexar arquivo" width="25px">
                    </div>

                    <button class="enviar">Enviar</button>
                </div>
            </div>
        </div>
    </main>

    <script src="activities-description.js"></script>
</body>

</html>
