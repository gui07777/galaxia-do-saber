<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo da Forca</title>
    <link rel="stylesheet" href="forca.css">
</head>
<body>
    <header class="header">
		<h1>Jogo da Forca</h1>
	</header>
    	<div class="tittle-content">
		<h3>Descubra a palavra!</h3><br/></a>
	</div>
    <!--Topo-->
    <div id="mensagem">Você ganhou!</div><br>
    <img id="imagem" src="imagens/imagens/Forca0.png">
    <div id="exibicao-palavra"></div>
    <input type="text" id="entrada-letra" placeholder="Chute uma letra" maxlength="1">
    <button id="btn-chutar" onclick="chutarLetra()"> Chutar </button>

    <!--Baixo-->
    <h2>Letras chutadas</h2>
    <div id="letras-chutadas"></div><br>
    <div style="text-align: center;">
    <button id="botao-reiniciar" onclick="iniciarJogo()">Recomeçar</button>
    </div>

    <!--Lógica-->
    <script>
        const listapalavras = ['gato', 'pato', 'leão', 'sapo', 'lobo', 'peixe', 'vaca', 'urso', 'bode',
        'bolo', 'pão', 'mel', 'milho', 'suco', 'pera', 'uva', 'arroz', 'carne',
        'mesa', 'cama', 'bola', 'sofá', 'livro', 'copo', 'faca', 'pano', 'vaso', 'raio',
        'flor', 'rio', 'mar', 'lua', 'sol', 'vento', 'areia', 'casa', 'céu', 'fogo', 'pedra',
        'mãe', 'pai', 'tio', 'mão', 'olho', 'boca', 'avó', 'bebê', 'dente',
        'dado', 'nota', 'riso', 'amor', 'vida', 'azul', 'leve', 'doce', 'paz', 'frio'
        ];

        let palavraEscolhida;
        let exibicaoPalavra;
        let letrasChutadas;
        let tentativasRestantes;
        let numeroErros;

        //função para iniciar o jogo
        function iniciarJogo(){

            document.getElementById('botao-reiniciar').style.display = 'none';
            document.getElementById('entrada-letra').disabled = false;
        //escolher palavra aleatória da lista
            palavraEscolhida = listapalavras[Math.floor(Math.random()*listapalavras.length)]
            console.log(palavraEscolhida);
            //inicializar exibição dos underscores
            exibicaoPalavra = Array(palavraEscolhida.length).fill('_');
            console.log(exibicaoPalavra)

            //inicializar lista de palavras chutadas
            letrasChutadas = [];

            //definir número máximo de tentativas
            tentativasRestantes = 7;

            //inicializar número de erros
            numeroErros = 0;

            atualizarExibicao();
        }

        function atualizarExibicao(){
            document.getElementById("exibicao-palavra").innerText = exibicaoPalavra.join(' ');
            document.getElementById("letras-chutadas").innerText = `${letrasChutadas.join(', ')}`;

            document.getElementById('mensagem').innerText = '';

            document.getElementById("imagem").src = `imagens/imagens/Forca${numeroErros}.png`;

            //verificar se o jogo terminou
            if(tentativasRestantes===0){
                encerrarJogo('Você perdeu!');
            }else if (!exibicaoPalavra.includes('_')){
                encerrarJogo('Parabens, você ganhou!')
            }   

        }

        function chutarLetra(){
            const entradaLetra = document.getElementById('entrada-letra');
            const letra = entradaLetra.value.toLowerCase();

            if(!letra.match(/[a-zà-ùç]/i)) {
                alert('Por favor, insira uma letra válida');
                return;
            }

            if(letrasChutadas.includes(letra)){
                alert('Você já tentou esta letra. Tente outra');
                return;
            }

            letrasChutadas.push(letra);

            if(palavraEscolhida.includes(letra)){
                for (let i=0; i < palavraEscolhida.length; i++){
                    if(palavraEscolhida[i] === letra){
                        exibicaoPalavra[i] = letra;
                    }
                }
            }else{
                tentativasRestantes--;
                numeroErros++;
            }

            entradaLetra.value = '';

            atualizarExibicao();
        }

        function encerrarJogo(mensagem) {
            //desabilitar campo de digitação
            document.getElementById('entrada-letra').disabled = true;

            //exibir mensagem
            document.getElementById('mensagem').style.display = 'block';
            document.getElementById('mensagem').innerText = mensagem;

            //exibir botão rreiniciar
            document.getElementById('botao-reiniciar').style.display = 'block';

        }

        window.load = iniciarJogo();
    </script>
    <div class="final-content">
		<h3>&copy;Galaxiadosaber</h3>
	</div>
</body>
</html>
