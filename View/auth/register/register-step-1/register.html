<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Cadastro</title>
  <link rel="stylesheet" href="register.css?v=4" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <form class="form" action="login.php" method="post">
    <div class="headers">
      <h2>Seja bem-vindo(a)!</h2>
      <p>Administrador, cadastre a sua instituição.</p>
    </div>
    <div class="fields">
        <div>
          <label for="email">Email:</label>
          <input type="email" name="email" required />
        </div>
        <div>
          <label for="password">Senha:</label>
          <input type="password" name="password" required />
        </div>
        <div>
          <label for="repeat-password">Repita a senha:</label>
          <input type="password" name="repeat-password" required />
        </div>
    </div>
    <div class="buttons">
      <input type="submit" value="Continuar">
      <a href="../../login/login.html">Já tenho uma conta. Entrar!</a>
    </div>
  </form>
</body>

</html>
