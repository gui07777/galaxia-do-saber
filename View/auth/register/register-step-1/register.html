<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Cadastro</title>
  <link rel="stylesheet" href="register.css?v=3" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <form class="form" action="login.php" method="post">
    <div class="titles">
      <h2>Seja bem-vindo(a)!</h2>
      <p>Administrador, cadastre a sua instituição.</p>
    </div>
    <div class="fields">
      <section>
        <div>
          <label for="social-reason">Razão Social:</label>
          <input type="text" name="social-reason" required />
        </div>
        <div>
          <label for="fantasy-name">Nome Fantasia:</label>
          <input type="text" name="fantasy-name" required />
        </div>
        <div>
          <label for="institution-type">Tipo de Instituição:</label>
          <select name="institution-type">
            <option value="option-one">Pública</option>
            <option value="option-two">Privada</option>
          </select>
        </div>
        <div>
          <label for="inep-code">Código Inep:</label>
          <input type="number" name="inep-code" required />
        </div>
        <div>
          <label for="fix-phone">Telefone Fixo:</label>
          <input type="number" name="fix-phone" required />
        </div>
        <div>
          <label for="cellphone">Celular/Whatssap:</label>
          <input type="number" name="cellphone" required />
        </div>
      </section>
      <section>
        <div>
          <label for="email">Email:</label>
          <input type="email" name="email" required />
        </div>
        <div>
          <label for="password">Senha:</label>
          <input type="password" name="password" required />
        </div>
        <div>
          <label for="repeat-password">Repita a senha:</label>
          <input type="password" name="repeat-password" required />
        </div>
    </div>
    <div class="buttons">
      <button href="../register-step-2/register-step-2.html">Continue</button>
    </div>
    </section>
  </form>
</body>

</html>
