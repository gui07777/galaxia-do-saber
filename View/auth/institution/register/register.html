<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Prossiga com o cadastro</title>
  <link rel="stylesheet" href="register.css?v=0" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <form class="form" action="../../../../Controller/InstituicaoController.php" method="post">
      <img src="../../../../assets/icons/volte.png" onclick="navigateBack()">
      <div class="headers">
        <h3>Seja bem-vindo(a)!</h3>
        <p>Administrador, preencha as informações de cadastro.</p>
      </div>
    <div class="fields">
      <section class="left-side">
        <div>
          <label>Razão Social:</label> <br>
          <input type="text" name="razao_social" required />
        </div>
        <div>
          <label>Nome Fantasia:</label> <br>
          <input type="text" name="nome_fantasia" required />
        </div>
        <div>
          <label>CNPJ:</label> <br>
          <input type="text" name="cnpj" id="cnpj" required />
        </div>
        <div>
          <label>Código Inep:</label> <br>
          <input type="text" name="codigo_inep" required />
        </div>
        <div>
          <label>Telefone:</label> <br>
          <input type="text" name="telefone" required />
        </div>
        <div>
          <label>E-mail:</label> <br>
          <input type="text" name="email" required />
        </div>
        <div>
          <label>Senha:</label> <br>
          <input type="password" name="senha" required />
        </div>
        <div>
          <label>Repita a senha:</label> <br>
          <input type="password" name="repetir_senha" required />
        </div>
      </section>
      <section class="right-side">
        <div>
          <label>CEP:</label> <br>
          <input type="text" name="cep" required />
        </div>
        <div>
          <label>Estado:</label> <br>
          <select name="estado">
            <option value=""></option>
            <option value="AC">AC</option>
            <option value="AL">AL</option>
            <option value="AP">AP</option>
            <option value="AM">AM</option>
            <option value="BA">BA</option>
            <option value="CE">CE</option>
            <option value="DF">DF</option>
            <option value="ES">ES</option>
            <option value="GO">GO</option>
            <option value="MA">MA</option>
            <option value="MT">MT</option>
            <option value="MS">MS</option>
            <option value="MG">MG</option>
            <option value="PA">PA</option>
            <option value="PB">PB</option>
            <option value="PR">PR</option>
            <option value="PE">PE</option>
            <option value="PI">PI</option>
            <option value="RJ">RJ</option>
            <option value="RN">RN</option>
            <option value="RS">RS</option>
            <option value="RO">RO</option>
            <option value="RR">RR</option>
            <option value="SC">SC</option>
            <option value="SP">SP</option>
            <option value="SE">SE</option>
            <option value="TO">TO</option>
          </select>
        </div>
        <div>
          <label>Município:</label> <br>
          <input type="text" name="municipio" id="municipio" required />
        </div>
        <div>
          <label>Bairro:</label> <br>
          <input type="text" name="bairro" id="bairro" required />
        </div>
        <div>
          <label>Rua:</label> <br>
          <input type="text" name="rua" id="rua" required />
        </div>
        <div>
          <label>Número:</label> <br>
          <input type="text" name="numero" id="numero" required />
        </div>
        <div>
          <label>Complemento:</label> <br>
          <input type="text" name="complemento" id="complemento" required />
        </div>
      </section>
    </div>
    <div class="buttons">
      <button type="submit" name="requisicao" value="Cadastrar">Enviar</button>
    </div>
  </form>
</body>
<script src="register.js"></script>

</html>
