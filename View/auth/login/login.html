<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página de Login</title>
  <link rel="stylesheet" href="login.css?v=1" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
</head>

<body>
  <form class="form-container" method="POST" action="../../Controller/UsuarioController.php">
    <div class="headers">
      <h2>Bem-vindo(a) de volta!</h2>
      <p>Entre na sua conta da Galáxia do Saber.</p>
    </div>
    <div class="fields">
      <div>
        <label>Email:</label><br>
        <input type="text" placeholder="Digite seu email" name="email"><br>
      </div>
      <div>
        <label>Senha:</label> <br>
        <input type="password" placeholder="Digite sua senha" name="password"><br>
      </div>
    </div>
    <div class="buttons">
      <input type="submit" value="Entrar" name="request">
      <a href="cadastro.html">Cadastre-se
        aqui!</a>
    </div>
  </form>
</body>

</html>
